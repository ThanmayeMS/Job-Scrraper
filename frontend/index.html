<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JobRadar</title>
<style>
  :root{
    --bg:#0a0a0f; --surface:#12121c; --surface2:#181826; --border:#242438; --border2:#2f2f48;
    --accent:#6ee7b7; --accent2:#818cf8; --accent3:#f472b6; --gold:#fbbf24; --red:#f87171;
    --text:#e8e8f2; --muted:#7a7a95;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px}
  input,select,textarea{font:inherit;background:#0f0f1a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 11px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent2)}
  .btn{background:var(--accent);color:#04140d;font-weight:700;padding:9px 16px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn.ghost:hover{border-color:var(--muted)}
  .btn.sm{padding:5px 10px;font-size:.8rem}
  .muted{color:var(--muted)}
  .hidden{display:none!important}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  header{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,15,.9);backdrop-filter:blur(8px);z-index:20}
  .brand{font-weight:800;letter-spacing:.14em;color:var(--accent)}
  .tabs{display:flex;gap:4px;margin-left:8px}
  .tab{padding:7px 14px;border-radius:8px;color:var(--muted);background:transparent;font-size:.85rem}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--accent);background:rgba(110,231,183,.08)}
  .spacer{margin-left:auto}

  main{max-width:1200px;margin:0 auto;padding:22px}

  /* Auth */
  .auth-wrap{max-width:420px;margin:8vh auto;padding:26px;background:var(--surface);border:1px solid var(--border);border-radius:14px}
  .auth-wrap h2{margin-bottom:4px}
  .auth-wrap p{margin-bottom:18px}
  .auth-wrap label{display:block;font-size:.78rem;color:var(--muted);margin:12px 0 5px}
  .auth-wrap input{width:100%}
  .auth-actions{display:flex;gap:10px;margin-top:18px}
  .auth-actions .btn{flex:1}

  /* Toolbar / filters */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar .grow{flex:1;min-width:180px}
  .scorebox{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0 12px;height:38px}
  .scorebox b{color:var(--accent);min-width:14px;text-align:center}
  input[type=range]{-webkit-appearance:none;height:4px;width:90px;background:var(--border);border-radius:3px;accent-color:var(--accent)}
  .pill{padding:0 12px;height:38px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:.8rem}
  .pill.on{color:var(--accent);border-color:rgba(110,231,183,.4);background:rgba(110,231,183,.06)}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .stat .v{font-size:1.4rem;font-weight:800}
  .stat .l{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}

  /* Cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:border-color .15s,transform .15s}
  .card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .card.applied{opacity:.55}
  .card .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .card .title{font-weight:700;line-height:1.3}
  .card .co{color:var(--accent);font-size:.82rem;margin-top:2px}
  .card .loc{color:var(--muted);font-size:.76rem}
  .ring{width:44px;height:44px;flex-shrink:0;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem}
  .card .actions{display:flex;gap:6px;margin-top:auto;align-items:center}
  .tagline{font-size:.78rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .chip{font-size:.68rem;padding:2px 8px;border-radius:20px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.3);color:var(--accent2)}

  /* Drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  .overlay.on{opacity:1;pointer-events:all}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(640px,96vw);background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .25s;z-index:41;display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .drawer .dhead{padding:18px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
  .drawer .dbody{padding:20px;overflow-y:auto;flex:1}
  .drawer .dfoot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--surface2)}
  .sec{margin-bottom:18px}
  .sec h4{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .sec .body{font-size:.85rem;line-height:1.7;color:#cfcfe0;white-space:pre-wrap}

  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase}

  .empty{padding:50px;text-align:center;color:var(--muted)}
  .drop{border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;color:var(--muted);cursor:pointer}
  .drop:hover{border-color:var(--accent)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 18px;font-size:.85rem;opacity:0;pointer-events:none;transition:all .2s;z-index:60;max-width:90vw}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header id="hdr" class="hidden">
  <span class="brand">JOBRADAR</span>
  <nav class="tabs" id="tabs">
    <button class="tab on" data-tab="matches">Matches</button>
    <button class="tab" data-tab="browse">Browse</button>
    <button class="tab" data-tab="cv">My CV</button>
    <button class="tab hidden" data-tab="admin" id="adminTab">Admin</button>
  </nav>
  <div class="spacer"></div>
  <span class="muted" id="whoami"></span>
  <button class="btn ghost sm" onclick="logout()">Log out</button>
</header>

<main id="app">
  <!-- AUTH -->
  <section id="view-auth">
    <div class="auth-wrap">
      <h2>JobRadar</h2>
      <p class="muted">Sign in, upload your CV, get scored matches.</p>
      <label>Email</label>
      <input id="auth-email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="auth-pass" type="password" placeholder="min 8 characters" />
      <div class="auth-actions">
        <button class="btn" onclick="doLogin()">Log in</button>
        <button class="btn ghost" onclick="doRegister()">Create account</button>
      </div>
      <button class="btn ghost" style="width:100%;margin-top:10px" onclick="doGuest()">Try as guest →</button>
      <p class="muted" id="auth-msg" style="margin-top:12px;font-size:.8rem"></p>
    </div>
  </section>

  <!-- MATCHES -->
  <section id="view-matches" class="hidden">
    <div class="stats" id="match-stats"></div>
    <div class="toolbar">
      <input class="grow" id="m-q" type="text" placeholder="Search title / company…" oninput="renderMatches()" />
      <select id="m-company" onchange="renderMatches()"><option value="">All companies</option></select>
      <div class="scorebox">min <input type="range" id="m-score" min="0" max="10" value="0" oninput="renderMatches()"/> <b id="m-scoreV">0</b></div>
      <button class="pill" id="m-saved" onclick="toggleSaved()">☆ Saved</button>
      <select id="m-applied" onchange="renderMatches()">
        <option value="hide">Hide applied</option>
        <option value="all">All</option>
        <option value="only">Applied only</option>
      </select>
      <button class="btn sm" onclick="runMatching()">⚡ Run matching</button>
    </div>
    <div class="grid" id="match-grid"></div>
  </section>

  <!-- BROWSE -->
  <section id="view-browse" class="hidden">
    <div class="toolbar">
      <input class="grow" id="b-q" type="text" placeholder="Search all scraped jobs…" />
      <select id="b-company"><option value="">All companies</option></select>
      <button class="btn" onclick="loadBrowse()">Search</button>
    </div>
    <div class="grid" id="browse-grid"></div>
  </section>

  <!-- CV -->
  <section id="view-cv" class="hidden">
    <div class="stats" id="cv-stats"></div>
    <div id="cv-drop" class="drop">
      <div style="font-size:1.6rem">📄</div>
      <div>Click to choose a CV (PDF or .txt), or paste text below</div>
      <input id="cv-file" type="file" accept=".pdf,.txt" class="hidden" />
    </div>
    <textarea id="cv-text" rows="6" placeholder="…or paste your resume text here" style="width:100%;margin-top:12px"></textarea>
    <div class="row" style="margin-top:12px">
      <button class="btn" onclick="uploadCv()">Upload CV</button>
      <button class="btn ghost" onclick="runMatching()">Run matching after upload</button>
    </div>
  </section>

  <!-- ADMIN -->
  <section id="view-admin" class="hidden">
    <div class="sec">
      <h4>Run scrapers</h4>
      <div class="row" id="admin-scrapers"></div>
      <div class="row" style="margin-top:10px">
        <button class="btn sm" onclick="triggerScrape()">Scrape selected</button>
        <button class="btn ghost sm" onclick="triggerEmbed()">Embed new jobs</button>
      </div>
    </div>
    <div class="sec">
      <h4>Recent scrape logs</h4>
      <table><thead><tr><th>Company</th><th>Date</th><th>New jobs</th><th>Status</th></tr></thead>
      <tbody id="admin-logs"></tbody></table>
    </div>
  </section>
</main>

<!-- Drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="dhead">
    <div id="d-title" style="font-weight:700;font-size:1.1rem"></div>
    <div id="d-co" class="muted" style="margin-top:4px"></div>
    <div id="d-meta" class="muted" style="font-size:.78rem;margin-top:6px"></div>
  </div>
  <div class="dbody" id="d-body"></div>
  <div class="dfoot" id="d-foot"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
// ── state ─────────────────────────────────────────────────────────────────────
let ME = null;
let MATCHES = [];          // cached match list
let SAVED_ONLY = false;
let CURRENT = null;        // job open in drawer

const $ = (id) => document.getElementById(id);
const token = () => localStorage.getItem("jr_token");
const esc = (s="") => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),3000); }

// ── api wrapper ───────────────────────────────────────────────────────────────
async function api(path, {method="GET", body=null, form=null}={}){
  const opts={method,headers:{}};
  if(token()) opts.headers["Authorization"]="Bearer "+token();
  if(form){ opts.body=form; }
  else if(body!=null){ opts.headers["Content-Type"]="application/json"; opts.body=JSON.stringify(body); }
  const r=await fetch(path,opts);
  if(r.status===401){ logout(); throw new Error("Session expired — please log in again."); }
  if(!r.ok){ let d; try{d=await r.json()}catch{d={detail:r.statusText}} throw new Error(d.detail||("HTTP "+r.status)); }
  const ct=r.headers.get("content-type")||"";
  return ct.includes("json") ? r.json() : r.text();
}

// ── auth ──────────────────────────────────────────────────────────────────────
async function doRegister(){
  const email=$("auth-email").value.trim(), password=$("auth-pass").value;
  try{ await api("/api/auth/register",{method:"POST",body:{email,password}}); $("auth-msg").textContent="Account created — logging you in…"; await doLogin(); }
  catch(e){ $("auth-msg").textContent=e.message; }
}
async function doLogin(){
  const email=$("auth-email").value.trim(), password=$("auth-pass").value;
  try{
    const b=new URLSearchParams({username:email,password});
    const r=await fetch("/api/auth/login",{method:"POST",body:b});
    if(!r.ok) throw new Error("Incorrect email or password");
    const {access_token}=await r.json();
    localStorage.setItem("jr_token",access_token);
    await boot();
  }catch(e){ $("auth-msg").textContent=e.message; }
}
async function doGuest(){
  try{
    const r=await fetch("/api/auth/guest",{method:"POST"});
    if(!r.ok) throw new Error("Guest login unavailable — is the database set up (alembic upgrade head)?");
    const {access_token}=await r.json();
    localStorage.setItem("jr_token",access_token);
    await boot();
  }catch(e){ $("auth-msg").textContent=e.message; }
}
function logout(){ localStorage.removeItem("jr_token"); ME=null; showAuth(); }

// ── boot / routing ─────────────────────────────────────────────────────────────
async function boot(){
  if(!token()){ showAuth(); return; }
  try{ ME=await api("/api/auth/me"); }catch{ showAuth(); return; }
  $("hdr").classList.remove("hidden");
  $("whoami").textContent=ME.email;
  $("adminTab").classList.toggle("hidden", !ME.is_superuser);
  $("view-auth").classList.add("hidden");
  await loadCompanies();
  showTab("matches");
}
function showAuth(){
  $("hdr").classList.add("hidden");
  ["matches","browse","cv","admin"].forEach(t=>$("view-"+t).classList.add("hidden"));
  $("view-auth").classList.remove("hidden");
}
function showTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===name));
  ["matches","browse","cv","admin"].forEach(t=>$("view-"+t).classList.toggle("hidden",t!==name));
  if(name==="matches") loadMatches();
  if(name==="browse") loadBrowse();
  if(name==="cv") loadCv();
  if(name==="admin") loadAdmin();
}
document.getElementById("tabs").addEventListener("click",e=>{ if(e.target.dataset.tab) showTab(e.target.dataset.tab); });

// ── companies (shared) ──────────────────────────────────────────────────────────
async function loadCompanies(){
  try{
    const cos=await api("/api/jobs/companies");
    for(const sel of ["m-company","b-company"]){
      const el=$(sel); el.innerHTML='<option value="">All companies</option>'+cos.map(c=>`<option>${esc(c)}</option>`).join("");
    }
  }catch{}
}

// ── matches ─────────────────────────────────────────────────────────────────────
async function loadMatches(){
  try{
    const data=await api("/api/matches?min_score=0&limit=200");
    MATCHES=data.items;
    renderMatchStats();
    renderMatches();
  }catch(e){ $("match-grid").innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}
function renderMatchStats(){
  const n=MATCHES.length, strong=MATCHES.filter(m=>m.score>=7).length;
  const applied=MATCHES.filter(m=>m.applied_date).length, saved=MATCHES.filter(m=>m.saved).length;
  $("match-stats").innerHTML=[["Matches",n],["Score ≥ 7",strong],["Saved",saved],["Applied",applied]]
    .map(([l,v])=>`<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");
}
function renderMatches(){
  $("m-scoreV").textContent=$("m-score").value;
  const q=$("m-q").value.toLowerCase(), co=$("m-company").value, min=+$("m-score").value, ap=$("m-applied").value;
  let list=MATCHES.filter(m=>{
    if(m.score<min) return false;
    if(co && m.job.company!==co) return false;
    if(SAVED_ONLY && !m.saved) return false;
    if(ap==="hide" && m.applied_date) return false;
    if(ap==="only" && !m.applied_date) return false;
    if(q && !((m.job.title+" "+m.job.company).toLowerCase().includes(q))) return false;
    return true;
  }).sort((a,b)=>b.score-a.score);
  const grid=$("match-grid");
  if(!list.length){ grid.innerHTML=`<div class="empty">No matches yet. Upload a CV, then hit ⚡ Run matching.</div>`; return; }
  grid.innerHTML=list.map(m=>card(m.job,m)).join("");
}
function toggleSaved(){ SAVED_ONLY=!SAVED_ONLY; $("m-saved").classList.toggle("on",SAVED_ONLY); $("m-saved").textContent=(SAVED_ONLY?"★":"☆")+" Saved"; renderMatches(); }

async function runMatching(){
  try{ const r=await api("/api/matches/run",{method:"POST"}); toast("Matching started — refresh in ~1 min."); }
  catch(e){ toast("Couldn't start matching: "+e.message); }
}

// ── browse ──────────────────────────────────────────────────────────────────────
async function loadBrowse(){
  const q=$("b-q").value.trim(), co=$("b-company").value;
  const qs=new URLSearchParams({limit:"100"}); if(q) qs.set("q",q); if(co) qs.set("company",co);
  try{
    const data=await api("/api/jobs?"+qs.toString());
    const grid=$("browse-grid");
    grid.innerHTML=data.items.length? data.items.map(j=>card(j,null)).join("") : `<div class="empty">No jobs yet. Run a scrape from the Admin tab.</div>`;
  }catch(e){ $("browse-grid").innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}

// ── card + drawer ─────────────────────────────────────────────────────────────
function scoreColor(s){ return s>=9?"var(--accent)":s>=7?"var(--accent2)":s>=5?"var(--gold)":"var(--red)"; }
function card(job,match){
  const s=match?match.score:null;
  let ring="";
  if(s!=null){ const C=2*Math.PI*18, off=C-C*s/10; ring=`<div class="ring"><svg width="44" height="44"><circle cx="22" cy="22" r="18" fill="none" stroke="var(--border)" stroke-width="3"/><circle cx="22" cy="22" r="18" fill="none" stroke="${scoreColor(s)}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="num" style="color:${scoreColor(s)}">${s}</div></div>`; }
  const applied=match&&match.applied_date;
  const key=job.id;
  return `<div class="card ${applied?'applied':''}" onclick="openDrawer(${key},${match?'true':'false'})">
    <div class="top"><div><div class="title">${esc(job.title)}</div><div class="co">${esc(job.company)}</div><div class="loc">${esc(job.locations||"")}</div></div>${ring}</div>
    ${match&&match.reason?`<div class="tagline">${esc(match.reason)}</div>`:""}
    <div class="actions">
      ${match?`<button class="btn ghost sm" onclick="event.stopPropagation();track(${key},'saved',${!match.saved})">${match.saved?'★ Saved':'☆ Save'}</button>
              <button class="btn ghost sm" onclick="event.stopPropagation();track(${key},'applied',${!match.applied_date})">${match.applied_date?'✓ Applied':'Mark applied'}</button>`:""}
      <a class="btn sm" style="margin-left:auto" href="${esc(job.apply_url)}" target="_blank" onclick="event.stopPropagation()">Apply ↗</a>
    </div>
  </div>`;
}

function findJob(id){ const m=MATCHES.find(x=>x.job.id===id); if(m) return {job:m.job,match:m}; return null; }
async function openDrawer(id,isMatch){
  let job=null, match=null;
  const cached=findJob(id);
  if(cached){ job=cached.job; match=cached.match; }
  else{ try{ job=await api("/api/jobs/"+id); }catch(e){ toast(e.message); return; } }
  CURRENT={job,match};
  $("d-title").textContent=job.title;
  $("d-co").textContent=job.company;
  $("d-meta").textContent=[job.locations,job.posted_date].filter(Boolean).join(" · ");
  let html="";
  if(match){
    if(match.reason) html+=`<div class="sec"><h4>Why it matches (${match.score}/10)</h4><div class="body">${esc(match.reason)}</div></div>`;
    if(match.matching_skills&&match.matching_skills.length) html+=`<div class="sec"><h4>Matching skills</h4><div>${match.matching_skills.map(s=>`<span class="chip">${esc(s)}</span> `).join("")}</div></div>`;
    if(match.gaps) html+=`<div class="sec"><h4>Gaps</h4><div class="body">${esc(match.gaps)}</div></div>`;
  }
  html+=`<div class="sec"><h4>Description</h4><div class="body">${esc(job.description||"No description available.")}</div></div>`;
  $("d-body").innerHTML=html;
  $("d-foot").innerHTML=`<a class="btn" href="${esc(job.apply_url)}" target="_blank">Apply ↗</a>`+
    (match?`<button class="btn ghost" onclick="track(${job.id},'saved',${!match.saved});closeDrawer()">${match.saved?'★ Saved':'☆ Save'}</button>`:"");
  $("overlay").classList.add("on"); $("drawer").classList.add("on");
}
function closeDrawer(){ $("overlay").classList.remove("on"); $("drawer").classList.remove("on"); }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });

async function track(jobId,field,value){
  try{
    const body={}; body[field]=value;
    await api("/api/matches/"+jobId+"/tracker",{method:"PUT",body});
    const m=MATCHES.find(x=>x.job.id===jobId);
    if(m){ if(field==="saved") m.saved=value; if(field==="applied") m.applied_date=value?new Date().toISOString().slice(0,10):null; }
    renderMatchStats(); renderMatches();
  }catch(e){ toast(e.message); }
}

// ── CV ──────────────────────────────────────────────────────────────────────────
$("cv-drop").addEventListener("click",()=>$("cv-file").click());
$("cv-file").addEventListener("change",()=>{ const f=$("cv-file").files[0]; if(f) $("cv-drop").querySelector("div:last-child").textContent="Selected: "+f.name; });
async function loadCv(){
  try{
    const s=await api("/api/cv");
    $("cv-stats").innerHTML=[["CV uploaded",s.has_cv?"Yes":"No"],["Work profile",s.has_work_profile?"Ready":"Pending"],["Embedded",s.has_embedding?"Yes":"No"],["Resume chars",s.resume_chars||0]]
      .map(([l,v])=>`<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");
  }catch(e){ $("cv-stats").innerHTML=""; }
}
async function uploadCv(){
  const f=$("cv-file").files[0], text=$("cv-text").value.trim();
  const fd=new FormData();
  if(f) fd.append("file",f); else if(text) fd.append("text",text);
  else return toast("Choose a file or paste text first.");
  try{ await api("/api/cv",{method:"POST",form:fd}); toast("CV uploaded — profiling in background. Then Run matching."); loadCv(); }
  catch(e){ toast(e.message); }
}

// ── admin ─────────────────────────────────────────────────────────────────────
async function loadAdmin(){
  try{
    const s=await api("/api/admin/scrapers");
    $("admin-scrapers").innerHTML=s.map(c=>`<label class="muted"><input type="checkbox" value="${esc(c)}" checked> ${esc(c)}</label>`).join(" ");
    const logs=await api("/api/admin/scrape-logs");
    $("admin-logs").innerHTML=logs.length? logs.map(l=>`<tr><td>${esc(l.company)}</td><td>${esc(l.run_date)}</td><td>${l.new_jobs}</td><td>${esc(l.status)}</td></tr>`).join("") : `<tr><td colspan="4" class="muted">No runs yet.</td></tr>`;
  }catch(e){ $("admin-scrapers").innerHTML=`<span class="muted">${esc(e.message)}</span>`; }
}
async function triggerScrape(){
  const companies=[...document.querySelectorAll("#admin-scrapers input:checked")].map(i=>i.value);
  try{ await api("/api/admin/scrape",{method:"POST",body:{companies}}); toast("Scrape enqueued for: "+companies.join(", ")); }
  catch(e){ toast(e.message); }
}
async function triggerEmbed(){
  try{ await api("/api/admin/embed",{method:"POST"}); toast("Embedding enqueued."); }
  catch(e){ toast(e.message); }
}

// ── go ──────────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
