# Free Render blueprint for JobRadar.
#
# This intentionally deploys only one Free web service. Background workers are not
# free on Render, so set RUN_TASKS_INLINE=true and use Neon/Supabase Postgres.
# The service runs Alembic migrations before starting FastAPI.

services:
  - type: web
    name: jobradar
    runtime: docker
    plan: free
    healthCheckPath: /health
    dockerCommand: sh scripts/render-start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: RUN_TASKS_INLINE
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: JobRadar Admin
      - key: SEED_DEMO_DATA
        value: "true"
      - key: SCORING_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIM
        value: "1536"
      - key: PORTKEY_API_KEY
        sync: false
      - key: PORTKEY_VIRTUAL_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
